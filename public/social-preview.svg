<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
      <circle cx="60" cy="60" r="1.5" fill="#FFFFFF" fill-opacity="0.1"/>
    </pattern>

    <!-- Glows -->
    <radialGradient id="glowTopLeft" cx="0%" cy="0%" r="70%" fx="0%" fy="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glowBottomRight" cx="100%" cy="100%" r="70%" fx="100%" fy="100%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop Shadow for floating card -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-opacity="0.5" flood-color="#000000"/>
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glowTopLeft)"/>
  <rect width="1200" height="630" fill="url(#glowBottomRight)"/>

  <!-- Grid Pattern -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top Accent line -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Floating Card -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="1000" height="430" rx="20" fill="#0B1120" fill-opacity="0.9" stroke="#1E293B" stroke-width="2"/>
  </g>

  <!-- Card Header Dots -->
  <circle cx="140" cy="140" r="8" fill="#EF4444"/>
  <circle cx="170" cy="140" r="8" fill="#EAB308"/>
  <circle cx="200" cy="140" r="8" fill="#10B981"/>

  <!-- Main Persona Container -->
  <!-- Name -->
  <text x="140" y="270" font-family="Outfit, sans-serif" font-size="80" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">J. Sri Bhuvane</text>
  
  <!-- Role Wrapper styling -->
  <rect x="140" y="310" width="310" height="44" rx="22" fill="#3B82F6" fill-opacity="0.1" stroke="#3B82F6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="295" y="338" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-size="20" font-weight="700" fill="#60A5FA" letter-spacing="1">FRONTEND DEVELOPER</text>

  <!-- Description -->
  <text x="140" y="410" font-family="Outfit, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">Crafting premium, accessible, and</text>
  <text x="140" y="450" font-family="Outfit, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">high-performance digital experiences.</text>

  <!-- Abstract Tech Pattern on the right -->
  <g transform="translate(800, 200)">
    <circle cx="100" cy="115" r="90" fill="none" stroke="#3B82F6" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="10 10" />
    <circle cx="100" cy="115" r="130" fill="none" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.3" />
    <circle cx="100" cy="115" r="170" fill="none" stroke="#EC4899" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4 12" />
    
    <!-- Central Orb -->
    <circle cx="100" cy="115" r="40" fill="url(#accent)" />
    
    <!-- Pulse rings inside orb -->
    <circle cx="100" cy="115" r="20" fill="#FFFFFF" fill-opacity="0.2" />

    <!-- Orbiting nodes -->
    <circle cx="10" cy="115" r="8" fill="#3B82F6" />
    <circle cx="190" cy="115" r="10" fill="#EC4899" />
    <circle cx="100" cy="-15" r="6" fill="#A78BFA" />
    <circle cx="100" cy="245" r="8" fill="#EAB308" />
  </g>

  <!-- URL Bottom right of card -->
  <text x="1060" y="490" text-anchor="end" font-family="Fira Code, monospace" font-size="20" font-weight="400" fill="#64748B">sribhuvanej.online</text>

</svg>
